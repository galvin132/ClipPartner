name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main
    paths:
      - "workers/api/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

concurrency:
  group: cloudflare-worker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy clip-partner-api
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Worker bundle
        run: node ./node_modules/wrangler/bin/wrangler.js deploy --dry-run --config workers/api/wrangler.toml

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 64264c4d87edeb5f9669a3194ffbcc79
          command: deploy --config workers/api/wrangler.toml
