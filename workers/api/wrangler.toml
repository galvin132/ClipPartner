name = "clip-partner-api"
main = "src/index.ts"
compatibility_date = "2026-06-22"

[vars]
APP_ENV = "development"
FRONTEND_ORIGIN = "https://clip-partner.vercel.app"
NEXT_PUBLIC_SUPABASE_URL = "https://qhlesjopsqzcefsyjvgk.supabase.co"

[[r2_buckets]]
binding = "CLIP_PARTNER_BUCKET"
bucket_name = "clip-partner-assets"

[[queues.producers]]
binding = "CLIP_TASK_QUEUE"
queue = "clip-partner-clip-tasks"

[triggers]
crons = ["*/30 * * * *"]

# Production values should be set with:
# wrangler secret put SUPABASE_SERVICE_ROLE_KEY
# wrangler secret put WECHAT_OAUTH_APP_SECRET
# wrangler secret put FFMPEG_WORKER_TOKEN
# wrangler secret put DOUYIN_APP_SECRET
# wrangler secret put WECHAT_CHANNELS_APP_SECRET
