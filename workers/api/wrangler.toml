name = "clip-partner-api"
main = "src/index.ts"
compatibility_date = "2026-06-22"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true
head_sampling_rate = 1

[vars]
APP_ENV = "development"
ALLOW_MOCK_AUTH = "false"
FRONTEND_ORIGIN = "https://clip-partner.vercel.app"
NEXT_PUBLIC_SUPABASE_URL = "https://qhlesjopsqzcefsyjvgk.supabase.co"
R2_BUCKET_NAME = "clip-partner-assets"

[[r2_buckets]]
binding = "CLIP_PARTNER_BUCKET"
bucket_name = "clip-partner-assets"

[[queues.producers]]
binding = "CLIP_TASK_QUEUE"
queue = "clip-partner-clip-tasks"

[[queues.consumers]]
queue = "clip-partner-clip-tasks"
max_batch_size = 5
max_batch_timeout = 30

[triggers]
crons = ["*/30 * * * *"]

# Production values should be set with:
# wrangler secret put SUPABASE_SERVICE_ROLE_KEY
# wrangler secret put BETTER_AUTH_SECRET
# wrangler secret put R2_ACCOUNT_ID
# wrangler secret put R2_ACCESS_KEY_ID
# wrangler secret put R2_SECRET_ACCESS_KEY
# wrangler secret put WECHAT_OAUTH_APP_SECRET
# wrangler secret put FFMPEG_WORKER_TOKEN
# wrangler secret put DOUYIN_APP_SECRET
# wrangler secret put WECHAT_CHANNELS_APP_SECRET

# Mock auth is intentionally off by default. For local Worker demos that must
# accept the frontend demo account headers while third-party auth is pending,
# set ALLOW_MOCK_AUTH=true in a local `.dev.vars` file. Never enable it for
# production.
